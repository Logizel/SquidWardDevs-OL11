version: '3.8'

services:
  # 1. The FastAPI Backend (Merged and Updated)
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Maps local files to container so code updates live
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/clinical_db
      - REDIS_URL=redis://redis:6379/0  # Added Redis connection
    depends_on:
      - db
      - redis  # Added Redis dependency

  # 2. The React/Vite Frontend
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from conflicting
    environment:
      - VITE_API_URL=http://localhost:8000 # Tells React where the backend is
    depends_on:
      - backend

  # 3. The Redis Message Broker (The Radio Tower)
  redis:
    image: redis:7-alpine
    container_name: squidwarddevs-ol11-redis
    ports:
      - "6379:6379"

  # 4. The PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clinical_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistent storage

# Define the named volume for the database
volumes:
  postgres_data:
